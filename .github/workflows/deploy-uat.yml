name: Deploy UAT

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag da release para homologação"
        required: true

jobs:
  deploy-uat:
    runs-on: ubuntu-latest
    environment:
      name: uat

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate release tag
        run: |
          echo "Publicando tag ${{ github.event.inputs.release_tag }} em UAT"

      - name: Deploy to UAT (approval required in environment settings)
        run: |
          echo "kubectl apply -f k8s/namespaces/uat.yaml"
          echo "kubectl apply -k k8s/overlays/uat"
