version: "3.9"

services:
  api:
    image: node:20-alpine
    container_name: app-api-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./app:/app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: postgres://dev_user:dev_pass@db:5432/dev_db
    depends_on:
      - db

  web:
    image: node:20-alpine
    container_name: app-web-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./web:/app
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
      API_URL: http://localhost:3000

  db:
    image: postgres:16-alpine
    container_name: app-db-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_pass
      POSTGRES_DB: dev_db
    volumes:
      - db_dev_data:/var/lib/postgresql/data

volumes:
  db_dev_data:
